body:
  text: 西晉沙門法炬譯如是我聞一時佛住舍衛國祇樹給孤獨園夏安居爾時衆多上座聲聞於世尊左右樹下窟中安居時有衆多年少比丘詣佛所稽首佛足退坐一面佛為諸年少比丘種種說法示教照喜示教照喜已默然住諸年少比丘聞佛所說歡喜隨喜從座起作禮而去諸年少比丘往詣上座比丘所禮諸上座足已於一面坐時諸上座比丘作是念我等當攝受此諸年少比丘或一人受一人或一人受二三多人作是念已即便攝受或一人受一人或受二三多人或有上座乃至受六十人爾時世尊十五日布薩時於大衆前敷座而坐爾時世尊觀察諸比丘已告比丘善哉善哉我今喜諸比丘行諸正事是故比丘當勤精進於此舍衛國滿迦提月諸處人間比丘聞世尊於舍衛國安居滿迦提月已作衣竟持衣鉢於舍衛國人間遊行漸至舍衛國舉衣鉢洗足已詣世尊所稽首禮足已退坐一面爾時世尊為人間比丘種種說法示教照喜已默然爾時人間比丘聞佛說法歡喜隨喜從座起作禮而去往詣上座比丘所稽首禮足退坐一面時諸上座作是念我等當受此人間比丘或一人受一人或二三乃至多人即便受之或一人受一人或二三乃至有受六十人者彼上座比丘受諸人間比丘教戒教授善知先後次第爾時世尊月十五日布薩時於大衆前敷座而坐觀察諸比丘告諸比丘善哉善哉諸比丘我欣汝等所行正事樂法等所行正事諸比丘過去諸佛亦有比丘衆所行正事如今此衆未來諸佛所有諸衆亦當如是所行正事如今此衆所以者何今此衆中諸長老比丘有得初禪第二禪第三禪第四禪慈悲喜捨空入處識入處無所有入處非想非非想處具足住有比丘三結盡得須陀洹不墮惡趣法決定向三菩提七有天人往生究竟苦邊有比丘三結盡貪恚癡薄得斯陀含有比丘五下分結盡得阿那含生般涅槃不復還生此世有比丘得無量神通境界天耳他心智宿命智生死智漏盡智有比丘修不淨觀斷貪欲修慈心斷瞋恚修無常想斷我慢修安那般那念斷覺想云何比丘修安那般那念斷覺想是比丘依止聚落乃至觀滅出息如觀滅出息覺是名修安那般那念斷覺想佛說此經已諸比丘聞佛所說歡喜奉行
